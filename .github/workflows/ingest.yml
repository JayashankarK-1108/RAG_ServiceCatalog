name: Service Catalog Ingestion (LangChain)
# Loads the Excel file, chunks it, embeds via OpenAI, and upserts to Pinecone.

on:
  workflow_dispatch:
    inputs:
      reset:
        description: "Delete existing Pinecone index before ingestion"
        required: false
        default: "false"
      excel_file:
        description: "Custom Excel file path (leave blank for default)"
        required: false
        default: ""

jobs:
  ingest:
    name: Extract → Chunk → Embed → Pinecone
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Validate Excel before ingesting
        run: python scripts/validate_excel.py

      - name: 🚀 Run LangChain ingestion
        env:
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY:    ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
          PINECONE_CLOUD:      aws
          PINECONE_REGION:     us-east-1
          PYTHONPATH:          "."
        run: |
          FLAGS=""
          [ "${{ github.event.inputs.reset }}" = "true" ] && FLAGS="$FLAGS --reset"
          [ -n "${{ github.event.inputs.excel_file }}" ] && FLAGS="$FLAGS --file ${{ github.event.inputs.excel_file }}"
          python ingest.py $FLAGS

      - name: 📄 Upload ingestion log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-log-${{ github.run_number }}
          path: logs/ingest.log
          retention-days: 30

      - name: 📋 Job summary
        if: always()
        run: |
          echo "## 🗂️ LangChain Ingestion — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Reset  | ${{ github.event.inputs.reset || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| File   | ${{ github.event.inputs.excel_file || 'data/service_catalog.xlsx' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          if [ -f logs/ingest.log ]; then
            echo "### Last 20 log lines" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -20 logs/ingest.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
